apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: labmox-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/sbrerup/dripcloud.git'
    targetRevision: HEAD
    path: apps
    directory:
      recurse: true 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true