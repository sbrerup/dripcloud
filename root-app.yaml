apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: labmox-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/sbrerup/dripcloud.git'
    targetRevision: HEAD
    path: clusters/labmox/bootstrap
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true