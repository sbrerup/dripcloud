apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: 'https://pkgs.tailscale.com/helmcharts'
      targetRevision: 1.96.5
      chart: tailscale-operator
      helm:
        values: |
          apiServerProxyConfig:
            mode: "true"
            
    - repoURL: 'https://github.com/sbrerup/dripcloud.git'
      targetRevision: HEAD
      path: manifests/tailscale
        
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true 